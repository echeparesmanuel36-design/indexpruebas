<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AXIOM_PULSE_LINE // Kinetic Tethers Simulation</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <meta name="theme-color" content="#00ff66">

  <style>
    /* VARIABLES BARE-METAL KINETIC */
    :root {
      --bg-deep: #040406;
      --panel-glass: rgba(8, 8, 12, 0.6);
      --neon-primary: #00ff66; /* Verde Tensor */
      --neon-accent: #00d9ff;  /* Cian Magnético */
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.3);
      --border-glow: rgba(0, 255, 102, 0.15);
      --font-hud: 'Orbitron', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
    }

    html.light-mode {
      --bg-deep: #f4f6f0;
      --panel-glass: rgba(240, 245, 235, 0.75);
      --neon-primary: #00aa44;
      --neon-accent: #0088cc;
      --text-main: #0c0c12;
      --text-muted: rgba(12, 12, 18, 0.4);
      --border-glow: rgba(0, 170, 68, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    body {
      background-color: var(--bg-deep);
      color: var(--text-main);
      font-family: var(--font-hud);
      overflow: hidden;
      width: 100vw;
      height: 100dvh;
      position: relative;
      transition: background-color 0.4s ease;
    }

    #canvas-viewport {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    /* HUD OVERLAY PERIFÉRICO */
    .hud-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 40;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
      padding-top: calc(16px + env(safe-area-inset-top));
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }

    .interactive-element {
      pointer-events: auto;
    }

    .glass-panel {
      background: var(--panel-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-glow);
      border-radius: 8px;
      padding: 10px 14px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    /* MÉTRICAS ESQUINA SUPERIOR DERECHA */
    .hud-header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .metrics-cluster {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .metric-value {
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--neon-primary);
      letter-spacing: 1px;
    }

    .theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-glow);
      color: var(--text-main);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* BÚNKER DE NOTIFICACIONES ASÍNCRONAS */
    #pique-message-bunker {
      position: absolute;
      top: 25%;
      left: 50%;
      transform: translate(-100%, -50%);
      width: 85%;
      max-width: 380px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.95rem;
      background: rgba(255, 0, 60, 0.9);
      border: 1px solid #ff003c;
      padding: 12px;
      border-radius: 6px;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      z-index: 50;
    }

    #pique-message-bunker.active {
      opacity: 1;
      transform: translate(-50%, -50%);
    }

    /* DIRECTIVA MANUEL: ENCLAVE MINIATURIZADO ESQUINA INFERIOR IZQUIERDA */
    .dropzone-bunker {
      align-self: flex-start; /* Forzar esquina izquierda */
      width: 100%;
      max-width: 220px;       /* Tamaño súper ultra compacto */
      margin-bottom: 4px;
    }

    .auth-title {
      font-family: var(--font-hud);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: var(--neon-accent);
    }

    .form-group {
      display: flex;
      gap: 4px;
    }

    .auth-input {
      flex: 1;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid var(--border-glow);
      padding: 6px 8px;
      border-radius: 4px;
      color: #fff;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      outline: none;
      width: 60%;
    }

    .auth-btn {
      background: var(--neon-primary);
      border: none;
      color: #000;
      font-family: var(--font-hud);
      font-weight: 700;
      padding: 0 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.65rem;
      text-transform: uppercase;
    }

    .hidden { display: none !important; }

    /* WATERMARK DISCRETO EN LA OTRA ESQUINA INFERIOR */
    #axiom-watermark {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--watermark-color);
      pointer-events: none;
      z-index: 100;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <canvas id="canvas-viewport"></canvas>

  <div id="axiom-watermark">[AXIOM_PULSE_LINE // V1.0]</div>

  <div class="hud-overlay">
    
    <header class="hud-header interactive-element">
      <div class="glass-panel metrics-cluster">
        <div style="text-align: right;">
          <div style="font-size: 8px; color: var(--text-muted); letter-spacing: 1px;">INERTIA_SCORE</div>
          <div id="score-display" class="metric-value">000000</div>
        </div>
        <button id="theme-btn" class="theme-toggle" onclick="toggleThemeEngine()">
          <span id="theme-icon">⚡</span>
        </button>
      </div>
    </header>

    <div id="pique-message-bunker" class="interactive-element">
      <div id="pique-text">◤ ENLACE DE INERCIA ROTO ◢</div>
    </div>

    <div class="dropzone-bunker glass-panel interactive-element" id="auth-gate-bunker">
      <div id="login-form-wrapper">
        <h3 class="auth-title">◤ Enclave Auth ◢</h3>
        <div class="form-group">
          <input type="email" id="auth-email" class="auth-input" placeholder="EMAIL">
          <button id="auth-submit-btn" class="auth-btn" onclick="executeSupabaseAuth()">OK</button>
        </div>
      </div>
      
      <div id="user-logged-wrapper" class="hidden">
        <h3 class="auth-title" style="color: var(--neon-primary); margin: 0;">◤ Sincronizado ◢</h3>
      </div>
    </div>

  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ==========================================
    // 1. AUDIO-ID: SINTETIZADOR DE INERCIA DE FRECUENCIAS
    // ==========================================
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playPulseSound(freq, type = 'sine', duration = 0.1) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    // ==========================================
    // 2. VARIABLES DE SISTEMA Y CONFIGURACIÓN (120HZ)
    // ==========================================
    let scene, camera, renderer, player, nodes = [], tetherLine;
    let score = 0, lastTime = performance.now();
    
    // Físicas del Núcleo Cuántico
    let playerVel = new THREE.Vector3(0, 0, -6); // Avance continuo en Z
    let attachedNode = null;
    let tetherAngle = 0;
    let tetherRadius = 0;
    let isPressing = false;
    
    const RECORD_MANUEL = 1200;

    // ==========================================
    // 3. ARQUITECTURA DEL MOTOR DE FÍSICAS KINETIC
    // ==========================================
    function initEngine3D() {
      const canvas = document.getElementById('canvas-viewport');
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x040406);

      // Perspectiva cenital inclinada limpia
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 8, 4); 

      renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, powerPreference: "high-performance" });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      // Grid de datos infinito de fondo
      const gridHelper = new THREE.GridHelper(200, 100, 0x112211, 0x081108);
      gridHelper.position.y = -0.5;
      scene.add(gridHelper);

      // Jugador: Núcleo de luz cuántico (Esfera de Vectores)
      const playerGeo = new THREE.SphereGeometry(0.2, 8, 8);
      const playerMat = new THREE.MeshBasicMaterial({ color: 0x00ff66, wireframe: true });
      player = new THREE.Mesh(playerGeo, playerMat);
      scene.add(player);

      // Rayo Tensor Metálico (Línea dinámica)
      const lineMat = new THREE.LineBasicMaterial({ color: 0x00d9ff });
      const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
      tetherLine = new THREE.Line(lineGeo, lineMat);
      tetherLine.visible = false;
      scene.add(tetherLine);

      // Spawn procedural de los primeros satélites/nodos de órbita
      for(let i = 0; i < 10; i++) {
        spawnSatelliteNode(-i * 12);
      }

      // Captura de eventos táctiles (Toda la pantalla actúa de pulsador)
      window.addEventListener('pointerdown', () => { isPressing = true; });
      window.addEventListener('pointerup', () => { isPressing = false; attachedNode = null; tetherLine.visible = false; });
      window.addEventListener('resize', onWindowResize);

      animateEngineLoop();
    }

    function spawnSatelliteNode(zPos) {
      const xPos = (Math.random() - 0.5) * 8;
      const nodeGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.2, 6);
      const nodeMat = new THREE.MeshBasicMaterial({ color: 0x00d9ff, wireframe: true });
      const nodeMesh = new THREE.Mesh(nodeGeo, nodeMat);
      nodeMesh.position.set(xPos, 0, zPos);
      scene.add(nodeMesh);
      nodes.push(nodeMesh);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // ==========================================
    // 4. BUCLE DE EJECUCIÓN CONTINUO (120HZ)
    // ==========================================
    function animateEngineLoop() {
      requestAnimationFrame(animateEngineLoop);

      const time = performance.now();
      const delta = Math.min((time - lastTime) / 1000, 0.1); // Capar saltos de frames
      lastTime = time;

      if (!attachedNode) {
        // --- MODO 1: AVANCE E INERCIA LINEAL ---
        player.position.addScaledVector(playerVel, delta);
        
        // Si el operador pulsa, buscar el nodo más cercano hacia adelante para enganchar
        if (isPressing) {
          let closest = null;
          let minDist = 6; // Rango máximo de atracción magnética
          
          nodes.forEach(node => {
            let dist = player.position.distanceTo(node.position);
            if (dist < minDist && node.position.z < player.position.z) {
              minDist = dist;
              closest = node;
            }
          });

          if (closest) {
            attachedNode = closest;
            tetherRadius = minDist;
            // Calcular ángulo inicial respecto al satélite magnético
            tetherAngle = Math.atan2(player.position.z - attachedNode.position.z, player.position.x - attachedNode.position.x);
            tetherLine.visible = true;
            playPulseSound(587, 'square', 0.1); // Sonido metálico de enganche exitoso
          }
        }
      } else {
        // --- MODO 2: FÍSICAS DE FUERZA CENTRÍFUGA (ÓRBITA) ---
        // La velocidad lineal se convierte en velocidad angular basado en el radio del tensor
        const angularVelocity = playerVel.length() / tetherRadius;
        tetherAngle += angularVelocity * delta;

        // Calcular nueva posición matricial de la órbita
        player.position.x = attachedNode.position.x + Math.cos(tetherAngle) * tetherRadius;
        player.position.z = attachedNode.position.z + Math.sin(tetherAngle) * tetherRadius;

        // Recalcular el vector de velocidad de escape tangente a la curva por si suelta el dedo
        playerVel.set(-Math.sin(tetherAngle), 0, Math.cos(tetherAngle)).normalize().multiplyScalar(6.5);

        // Actualizar posiciones de la línea del tensor de luz
        const positions = tetherLine.geometry.attributes.position.array;
        positions[0] = player.position.x; positions[1] = player.position.y; positions[2] = player.position.z;
        positions[3] = attachedNode.position.x; positions[4] = attachedNode.position.y; positions[5] = attachedNode.position.z;
        tetherLine.geometry.attributes.position.needsUpdate = true;

        // Score dinámico por mantener el flujo del tensor activo
        score += Math.floor(10 * delta * angularVelocity);
        document.getElementById('score-display').innerText = String(score).padStart(6, '0');

        // Generar oscilación de audio procedural armónica según la fuerza del giro
        if (Math.random() < 0.15) {
          playPulseSound(200 + (angularVelocity * 30), 'sine', 0.05);
        }
      }

      // Seguimiento rígido y suave de la cámara tras el jugador
      camera.position.x = player.position.x;
      camera.position.z = player.position.z + 4;
      camera.lookAt(player.position.x, 0, player.position.z - 2);

      // Gestión procedural del mapa infinito (Reciclaje de nodos que quedan atrás)
      nodes.forEach(node => {
        if (node.position.z > player.position.z + 6) {
          node.position.z = player.position.z - 60 - (Math.random() * 10);
          node.position.x = (Math.random() - 0.5) * 8;
        }

        // Detección de colisiones directa contra el núcleo de los satélites
        if (player.position.distanceTo(node.position) < 0.4 && node !== attachedNode) {
          triggerColapsoInercial();
        }
      });

      // Límite de fuga lateral de control de mapa (Salirse del perímetro)
      if (Math.abs(player.position.x) > 12) {
        triggerColapsoInercial();
      }

      renderer.render(scene, camera);
    }

    // COLAPSO POR IMPACTO O FUGA DE LÍNEA
    function triggerColapsoInercial() {
      playPulseSound(120, 'sawtooth', 0.3);
      
      attachedNode = null;
      tetherLine.visible = false;
      isPressing = false;

      const piqueBunker = document.getElementById('pique-message-bunker');
      const diff = RECORD_MANUEL - score;

      if (diff > 0) {
        piqueBunker.innerHTML = `◤ COLAPSO VECTORIAL ◢<br><br>Has quedado a <span style="color:var(--neon-accent); font-weight:900;">${diff}</span> puntos de inercia del récord de Manuel.`;
      } else {
        piqueBunker.innerHTML = `◤ MARCA SOBERANA SUPERADA ◢<br><br>Has reventado el límite por ${Math.abs(diff)} unidades de inercia cuántica.`;
      }

      piqueBunker.classList.add('active');
      if (navigator.vibrate) navigator.vibrate([150, 50, 150]);

      // Reseteo en caliente del bus de la simulación
      score = 0;
      player.position.set(0, 0, 0);
      playerVel.set(0, 0, -6);
      document.getElementById('score-display').innerText = "000000";

      setTimeout(() => piqueBunker.classList.remove('active'), 3200);
    }

    // CONMUTACIÓN ELÁSTICA DEL MODO AMBIENTAL
    function toggleThemeEngine() {
      const htmlEl = document.documentElement;
      const icon = document.getElementById('theme-icon');
      if (htmlEl.classList.contains('light-mode')) {
        htmlEl.classList.remove('light-mode');
        icon.innerText = "⚡";
        if(scene) scene.background.setHex(0x040406);
      } else {
        htmlEl.classList.add('light-mode');
        icon.innerText = "🌙";
        if(scene) scene.background.setHex(0xf4f6f0);
      }
      playPulseSound(700, 'sine', 0.04);
    }

    // FORMULARIO DE ACCESO ULTRA-COMPACTO SUPABASE
    function executeSupabaseAuth() {
      const email = document.getElementById('auth-email').value;
      if (!email || !email.includes('@')) return;
      playPulseSound(900, 'sine', 0.08);
      document.getElementById('login-form-wrapper').classList.add('hidden');
      document.getElementById('user-logged-wrapper').classList.remove('hidden');
    }

    window.onload = initEngine3D;
  </script>
</body>
</html>
