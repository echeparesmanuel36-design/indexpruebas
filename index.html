<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM QR FACTORY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
    <style>
        :root[data-theme="dark"] {
            --bg: #03060a;
            --surface: rgba(9,13,20,0.97);
            --text: #F5F6F8;
            --muted: #8E92A2;
            --cyan: #00e5ff;
            --purple: #9b51e0;
            --green: #00ff66;
            --border: rgba(255,255,255,0.07);
            --card: rgba(9,13,20,0.6);
        }
        :root[data-theme="light"] {
            --bg: #F2F4F8;
            --surface: rgba(255,255,255,0.96);
            --text: #101219;
            --muted: #5F6473;
            --cyan: #00b8cc;
            --purple: #823bc2;
            --green: #00aa44;
            --border: rgba(0,0,0,0.09);
            --card: rgba(255,255,255,0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }
        .blob1, .blob2 {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.15;
        }
        .blob1 { top: 10%; right: 10%; background: radial-gradient(circle, var(--cyan) 0%, transparent 70%); }
        .blob2 { bottom: 10%; left: 5%; background: radial-gradient(circle, var(--purple) 0%, transparent 70%); }
        header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }
        .logo { font-weight: 600; font-size: 13px; letter-spacing: 0.25em; text-transform: uppercase; }
        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 20px;
        }
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 24px 60px;
            position: relative;
            z-index: 5;
        }
        h1 { font-family: 'Playfair Display', serif; font-size: 52px; text-align: center; margin-bottom: 16px; }
        .subtitle { text-align: center; font-size: 17px; color: var(--muted); margin-bottom: 48px; }
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 800px) {
            .grid-2col { grid-template-columns: 1fr; }
        }
        .glass-card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 28px;
        }
        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--muted);
            display: block;
            margin-bottom: 12px;
        }
        input, select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            color: var(--text);
            font-size: 13px;
        }
        .color-row {
            display: flex;
            gap: 16px;
            margin: 16px 0;
        }
        .color-row div { flex: 1; }
        button {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 40px;
            color: var(--text);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }
        button.primary {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: #000;
            border: none;
        }
        .qr-container {
            background: var(--bg);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }
        .stat-box {
            background: var(--bg);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .stats-row {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }
        .stat-number { font-size: 28px; font-weight: 700; color: var(--green); }
        .stat-label { font-size: 10px; color: var(--muted); }
        footer { text-align: center; padding: 40px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }
        #qrcode img { margin: 0 auto; }
    </style>
</head>
<body>
<div class="blob1"></div><div class="blob2"></div>
<header><div class="logo">AXIOM SYSTEMS</div><button class="theme-toggle" id="themeToggle">🌙</button></header>
<main>
    <h1>📱 AXIOM QR FACTORY</h1>
    <div class="subtitle">Genera códigos QR profesionales. Sin marca. Sin registro. 100% local.</div>
    <div class="grid-2col">
        <div class="glass-card">
            <label>🔗 ENLACE O TEXTO</label>
            <input type="text" id="qrText" placeholder="https://..." value="https://axiom-systems.com">
            <div class="color-row">
                <div><label>🎨 COLOR QR</label><input type="color" id="qrColor" value="#000000"></div>
                <div><label>⬜ FONDO</label><input type="color" id="bgColor" value="#ffffff"></div>
            </div>
            <label>📏 TAMAÑO</label>
            <select id="qrSize">
                <option value="150">Pequeño (150px)</option>
                <option value="250" selected>Mediano (250px)</option>
                <option value="400">Grande (400px)</option>
            </select>
            <div class="flex-row"><button id="generateBtn" class="primary">🎯 GENERAR QR</button></div>
        </div>
        <div class="glass-card">
            <label>📷 CÓDIGO QR</label>
            <div class="qr-container"><div id="qrcode"></div></div>
            <div class="flex-row">
                <button id="downloadPngBtn">📥 PNG</button>
                <button id="downloadSvgBtn">📥 SVG</button>
                <button id="copyLinkBtn">🔗 Copiar</button>
            </div>
            <div class="stats-row"><div class="stat-box"><div class="stat-number" id="qrCount">0</div><div class="stat-label">QR generados</div></div></div>
        </div>
    </div>
</main>
<footer>© 2026 AXIOM SYSTEMS · 100% local · Tus datos no salen de tu navegador</footer>
<script>
    let count = 0;
    let currentQRDataURL = null;

    function generateQR() {
        const text = document.getElementById('qrText').value.trim();
        const darkColor = document.getElementById('qrColor').value;
        const lightColor = document.getElementById('bgColor').value;
        const size = parseInt(document.getElementById('qrSize').value);

        if (!text) {
            alert("Introduce un enlace o texto");
            return;
        }

        const container = document.getElementById('qrcode');
        container.innerHTML = "";

        try {
            const qr = new QRCode(container, {
                text: text,
                width: size,
                height: size,
                colorDark: darkColor,
                colorLight: lightColor,
                correctLevel: QRCode.CorrectLevel.H
            });
            
            // Para capturar la imagen para descargar
            setTimeout(() => {
                const img = container.querySelector('img');
                if (img && img.src) {
                    currentQRDataURL = img.src;
                }
                count++;
                document.getElementById('qrCount').innerText = count;
            }, 100);
            
        } catch (error) {
            console.error("Error generando QR:", error);
            alert("Error al generar el QR. Revisa la consola.");
        }
    }

    function downloadPNG() {
        if (!currentQRDataURL) {
            alert("Genera un QR primero");
            return;
        }
        const link = document.createElement('a');
        link.download = `axiom-qr-${Date.now()}.png`;
        link.href = currentQRDataURL;
        link.click();
    }

    function downloadSVG() {
        const text = document.getElementById('qrText').value.trim();
        const darkColor = document.getElementById('qrColor').value;
        const lightColor = document.getElementById('bgColor').value;
        const size = parseInt(document.getElementById('qrSize').value);

        if (!text) {
            alert("Genera un QR primero");
            return;
        }

        const qr = new QRCode(-1, QRCode.CorrectLevel.H);
        qr.addData(text);
        qr.make();

        const modules = qr.getModuleCount();
        const cellSize = size / modules;
        let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
        svg += `<rect width="${size}" height="${size}" fill="${lightColor}"/>`;

        for (let row = 0; row < modules; row++) {
            for (let col = 0; col < modules; col++) {
                if (qr.isDark(row, col)) {
                    svg += `<rect x="${col * cellSize}" y="${row * cellSize}" width="${cellSize}" height="${cellSize}" fill="${darkColor}"/>`;
                }
            }
        }
        svg += `</svg>`;

        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = `axiom-qr-${Date.now()}.svg`;
        link.href = url;
        link.click();
        URL.revokeObjectURL(url);
    }

    function copyLink() {
        const text = document.getElementById('qrText').value.trim();
        if (!text) {
            alert("Introduce un enlace o texto");
            return;
        }
        navigator.clipboard.writeText(text);
        alert("Enlace copiado al portapapeles");
    }

    document.getElementById('generateBtn').addEventListener('click', generateQR);
    document.getElementById('downloadPngBtn').addEventListener('click', downloadPNG);
    document.getElementById('downloadSvgBtn').addEventListener('click', downloadSVG);
    document.getElementById('copyLinkBtn').addEventListener('click', copyLink);

    // Tema oscuro/claro
    const themeToggle = document.getElementById('themeToggle');
    const htmlTag = document.documentElement;
    themeToggle.addEventListener('click', () => {
        const isDark = htmlTag.getAttribute('data-theme') === 'dark';
        htmlTag.setAttribute('data-theme', isDark ? 'light' : 'dark');
        themeToggle.innerText = isDark ? '☀️' : '🌙';
    });

    // Generar QR inicial
    generateQR();
</script>
</body>
</html>
