<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM QR FACTORY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
    <style>
        :root[data-theme="dark"] {
            --bg: #03060a;
            --surface: rgba(9,13,20,0.97);
            --text: #F5F6F8;
            --muted: #8E92A2;
            --cyan: #00e5ff;
            --purple: #9b51e0;
            --green: #00ff66;
            --border: rgba(255,255,255,0.07);
            --card: rgba(9,13,20,0.6);
        }
        :root[data-theme="light"] {
            --bg: #F2F4F8;
            --surface: rgba(255,255,255,0.96);
            --text: #101219;
            --muted: #5F6473;
            --cyan: #00b8cc;
            --purple: #823bc2;
            --green: #00aa44;
            --border: rgba(0,0,0,0.09);
            --card: rgba(255,255,255,0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }
        .blob1, .blob2 {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.15;
        }
        .blob1 { top: 10%; right: 10%; background: radial-gradient(circle, var(--cyan) 0%, transparent 70%); }
        .blob2 { bottom: 10%; left: 5%; background: radial-gradient(circle, var(--purple) 0%, transparent 70%); }
        header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }
        .logo { font-weight: 600; font-size: 13px; letter-spacing: 0.25em; text-transform: uppercase; }
        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 20px;
        }
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 24px 60px;
            position: relative;
            z-index: 5;
        }
        h1 { font-family: 'Playfair Display', serif; font-size: 52px; text-align: center; margin-bottom: 16px; }
        .subtitle { text-align: center; font-size: 17px; color: var(--muted); margin-bottom: 48px; }
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 800px) {
            .grid-2col { grid-template-columns: 1fr; }
        }
        .glass-card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 28px;
        }
        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--muted);
            display: block;
            margin-bottom: 12px;
        }
        input, select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            color: var(--text);
            font-size: 13px;
        }
        .color-row {
            display: flex;
            gap: 16px;
            margin: 16px 0;
        }
        .color-row div { flex: 1; }
        button {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 40px;
            color: var(--text);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }
        button.primary {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: #000;
            border: none;
        }
        .qr-container {
            background: var(--bg);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }
        .stat-box {
            background: var(--bg);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .stats-row {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }
        .stat-number { font-size: 28px; font-weight: 700; color: var(--green); }
        .stat-label { font-size: 10px; color: var(--muted); }
        footer { text-align: center; padding: 40px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }
    </style>
</head>
<body>
<div class="blob1"></div><div class="blob2"></div>
<header><div class="logo">AXIOM SYSTEMS</div><button class="theme-toggle" id="themeToggle">🌙</button></header>
<main>
    <h1>📱 AXIOM QR FACTORY</h1>
    <div class="subtitle">Genera códigos QR profesionales. Sin marca. Sin registro. 100% local.</div>
    <div class="grid-2col">
        <div class="glass-card">
            <label>🔗 ENLACE O TEXTO</label>
            <input type="text" id="qrText" placeholder="https://..." value="https://axiom-systems.com">
            <div class="color-row">
                <div><label>🎨 COLOR QR</label><input type="color" id="qrColor" value="#000000"></div>
                <div><label>⬜ FONDO</label><input type="color" id="bgColor" value="#ffffff"></div>
            </div>
            <label>📏 TAMAÑO</label>
            <select id="qrSize">
                <option value="150">Pequeño (150px)</option>
                <option value="250" selected>Mediano (250px)</option>
                <option value="400">Grande (400px)</option>
            </select>
            <div class="flex-row"><button id="generateBtn" class="primary">🎯 GENERAR QR</button></div>
        </div>
        <div class="glass-card">
            <label>📷 CÓDIGO QR</label>
            <div class="qr-container"><div id="qrcode"></div></div>
            <div class="flex-row">
                <button id="downloadPngBtn">📥 PNG</button>
                <button id="downloadSvgBtn">📥 SVG</button>
                <button id="copyLinkBtn">🔗 Copiar</button>
            </div>
            <div class="stats-row"><div class="stat-box"><div class="stat-number" id="qrCount">0</div><div class="stat-label">QR generados</div></div></div>
        </div>
    </div>
</main>
<footer>© 2026 AXIOM SYSTEMS · 100% local · Tus datos no salen de tu navegador</footer>
<script>
    let count = 0, currentDataURL = null;
    function gen() {
        const text = document.getElementById('qrText').value.trim();
        const dark = document.getElementById('qrColor').value;
        const light = document.getElementById('bgColor').value;
        const size = parseInt(document.getElementById('qrSize').value);
        if (!text) return alert("Escribe algo");
        const canvas = document.createElement('canvas');
        new QRCode(canvas, { text, width: size, height: size, colorDark: dark, colorLight: light, correctLevel: QRCode.CorrectLevel.H });
        setTimeout(() => {
            currentDataURL = canvas.toDataURL('image/png');
            const img = document.createElement('img');
            img.src = currentDataURL;
            img.style.width = size + 'px';
            document.getElementById('qrcode').innerHTML = '';
            document.getElementById('qrcode').appendChild(img);
            count++;
            document.getElementById('qrCount').innerText = count;
        }, 50);
    }
    document.getElementById('generateBtn').onclick = gen;
    document.getElementById('downloadPngBtn').onclick = () => { if(currentDataURL) { let a = document.createElement('a'); a.href = currentDataURL; a.download = 'qrcode.png'; a.click(); } else alert("Genera un QR"); };
    document.getElementById('downloadSvgBtn').onclick = () => {
        const text = document.getElementById('qrText').value.trim();
        const dark = document.getElementById('qrColor').value;
        const light = document.getElementById('bgColor').value;
        const size = parseInt(document.getElementById('qrSize').value);
        if (!text) return alert("Genera un QR");
        const qr = new QRCode(-1, QRCode.CorrectLevel.H);
        qr.addData(text); qr.make();
        const m = qr.getModuleCount();
        const cell = size / m;
        let svg = `<svg width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg"><rect width="${size}" height="${size}" fill="${light}"/>`;
        for(let r=0; r<m; r++) for(let c=0; c<m; c++) if(qr.isDark(r,c)) svg += `<rect x="${c*cell}" y="${r*cell}" width="${cell}" height="${cell}" fill="${dark}"/>`;
        svg += `</svg>`;
        const blob = new Blob([svg], {type:'image/svg+xml'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'qrcode.svg';
        a.click();
        URL.revokeObjectURL(a.href);
    };
    document.getElementById('copyLinkBtn').onclick = () => { const t = document.getElementById('qrText').value.trim(); if(t) { navigator.clipboard.writeText(t); alert("Copiado"); } else alert("Escribe algo"); };
    const toggle = document.getElementById('themeToggle'), html = document.documentElement;
    toggle.onclick = () => { const isDark = html.getAttribute('data-theme') === 'dark'; html.setAttribute('data-theme', isDark ? 'light' : 'dark'); toggle.innerText = isDark ? '☀️' : '🌙'; };
    gen();
</script>
</body>
</html>
