<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuel | Fundador de Axiom Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght=0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* --- VARIABLES DE DISEÑO CON SOPORTE DE TEMAS (DISEÑO 1) --- */
        :root[data-theme="dark"] {
            --bg-color: #050608;
            --surface-color: rgba(13, 15, 22, 0.96);
            --text-main: #F5F6F8;
            --text-muted: #8E919A;
            --accent-glow-1: #00ff66; /* Verde Esmeralda Cyberpunk */
            --accent-glow-2: #00e5ff; /* Cyan Eléctrico */
            --border-color: rgba(255, 255, 255, 0.07);
            --code-bg: #0A0C12;
            --glass-fill: rgba(255, 255, 255, 0.03);
            --glass-stroke: rgba(255, 255, 255, 0.14);
        }

        :root[data-theme="light"] {
            --bg-color: #F4F6F9;
            --surface-color: rgba(255, 255, 255, 0.94);
            --text-main: #12141C;
            --text-muted: #626673;
            --accent-glow-1: #00cc52; 
            --accent-glow-2: #00b8cc; 
            --border-color: rgba(0, 0, 0, 0.08);
            --code-bg: #EAEFF5;
            --glass-fill: rgba(0, 0, 0, 0.01);
            --glass-stroke: rgba(0, 0, 0, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* --- GRADIENTES ORGÁNICOS DE FONDO --- */
        .background-blob-1 {
            position: absolute;
            top: 20%;
            left: 10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-glow-1) 0%, transparent 65%);
            opacity: 0.18;
            z-index: 1;
            pointer-events: none;
        }

        .background-blob-2 {
            position: absolute;
            top: 40%;
            right: 10%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, var(--accent-glow-2) 0%, transparent 65%);
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
        }
        /* --- ESTILOS DE ESTRUCTURA Y ETIQUETAS (DISEÑO 1) --- */
        header {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }

        /* BOTÓN INTERCAMBIADOR DE TEMA */
        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .theme-toggle:hover {
            background: var(--text-main);
            color: var(--bg-color);
        }

        main {
            max-width: 900px;
            width: 100%;
            margin: auto;
            padding: 20px 24px 80px 24px;
            text-align: center;
            z-index: 5;
        }

        .category-tag {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-bottom: 24px;
            display: block;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: 52px;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
        }

        .subtitle {
            font-size: 17px;
            color: var(--text-muted);
            line-height: 1.65;
            max-width: 620px;
            margin: 0 auto 48px auto;
            font-weight: 300;
        }

        /* --- CONTENEDOR ESCENA DEL CRISTAL REFRACTIVO --- */
        .glass-scene {
            position: relative;
            width: 100%;
            max-width: 750px;
            margin: 0 auto 48px auto;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
        }

        .glass-bg {
            background-color: var(--surface-color);
            padding: 40px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 24px;
            transition: background-color 0.5s ease;
        }

        .glass-wrapper {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }
