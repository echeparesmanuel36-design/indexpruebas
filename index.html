<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuel | Fundador de Axiom Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght=0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* --- VARIABLES DE DISEÑO CON SOPORTE DE TEMAS (DISEÑO 1) --- */
        :root[data-theme="dark"] {
            --bg-color: #050608;
            --surface-color: rgba(13, 15, 22, 0.96);
            --text-main: #F5F6F8;
            --text-muted: #8E919A;
            --accent-glow-1: #00ff66; /* Verde Esmeralda Cyberpunk */
            --accent-glow-2: #00e5ff; /* Cyan Eléctrico */
            --border-color: rgba(255, 255, 255, 0.07);
            --code-bg: #0A0C12;
            --glass-fill: rgba(255, 255, 255, 0.03);
            --glass-stroke: rgba(255, 255, 255, 0.14);
        }

        :root[data-theme="light"] {
            --bg-color: #F4F6F9;
            --surface-color: rgba(255, 255, 255, 0.94);
            --text-main: #12141C;
            --text-muted: #626673;
            --accent-glow-1: #00cc52; 
            --accent-glow-2: #00b8cc; 
            --border-color: rgba(0, 0, 0, 0.08);
            --code-bg: #EAEFF5;
            --glass-fill: rgba(0, 0, 0, 0.01);
            --glass-stroke: rgba(0, 0, 0, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* --- GRADIENTES ORGÁNICOS DE FONDO --- */
        .background-blob-1 {
            position: absolute;
            top: 20%;
            left: 10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-glow-1) 0%, transparent 65%);
            opacity: 0.18;
            z-index: 1;
            pointer-events: none;
        }

        .background-blob-2 {
            position: absolute;
            top: 40%;
            right: 10%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, var(--accent-glow-2) 0%, transparent 65%);
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
        }
