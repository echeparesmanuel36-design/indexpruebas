<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AXIOM QR FACTORY | Generador profesional de QR</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/addons.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
</head>
<body>
<div class="blob1"></div>
<div class="blob2"></div>
<header>
    <div class="logo">AXIOM SYSTEMS</div>
    <button class="theme-toggle" id="themeToggle">🌙</button>
</header>
<main>
    <h1>📱 AXIOM QR FACTORY</h1>
    <div class="subtitle">Genera códigos QR profesionales. Sin marca de agua. Sin registro. 100% local.</div>

    <div class="grid-2col">
        <div class="glass-card">
            <label>🔗 ENLACE O TEXTO</label>
            <input type="text" id="qrText" placeholder="https:// o texto libre..." value="https://axiom-systems.com">
            
            <div class="color-row">
                <div>
                    <label>🎨 COLOR QR</label>
                    <input type="color" id="qrColor" value="#000000">
                </div>
                <div>
                    <label>⬜ COLOR FONDO</label>
                    <input type="color" id="bgColor" value="#ffffff">
                </div>
            </div>
            
            <label>📏 TAMAÑO</label>
            <select id="qrSize">
                <option value="150">Pequeño (150px)</option>
                <option value="250" selected>Mediano (250px)</option>
                <option value="400">Grande (400px)</option>
                <option value="600">Extra grande (600px)</option>
            </select>
            
            <div class="flex-row">
                <button id="generateBtn" class="primary">🎯 GENERAR QR</button>
            </div>
        </div>

        <div class="glass-card">
            <label>📷 CÓDIGO QR</label>
            <div class="qr-container" id="qrContainer">
                <div id="qrcode"></div>
            </div>
            <div class="flex-row">
                <button id="downloadPngBtn">📥 PNG</button>
                <button id="downloadSvgBtn">📥 SVG</button>
                <button id="copyLinkBtn">🔗 Copiar enlace</button>
            </div>
            <div class="stats-row">
                <div class="stat-box"><div class="stat-number" id="qrCount">0</div><div class="stat-label">QR generados</div></div>
            </div>
        </div>
    </div>
</main>
<footer>© 2026 AXIOM SYSTEMS · 100% local · Tus datos no salen de tu navegador</footer>
<script src="js/ui.js"></script>
</body>
</html>
