<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Axiom | Asset Manager</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #0a0a0a;
            --border: #1a1a1a;
            --text: #e0e0e0;
            --accent: #ffffff;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 40px; }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 40px; }
        .logo { font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase; }
        
        /* Sistema de Lista Técnica */
        .asset-row { border-bottom: 1px solid var(--border); cursor: pointer; padding: 20px 0; transition: 0.2s; }
        .asset-row:hover { border-color: var(--accent); }
        .asset-header { display: grid; grid-template-columns: 2fr 1fr 1fr; align-items: center; }
        .asset-details { display: none; padding: 20px 0; color: #888; font-size: 13px; line-height: 1.6; }
        
        .active .asset-details { display: block; }
        .status { font-size: 10px; border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">Axiom Systems // Asset Manager</div>
        <div id="themeToggle" style="cursor:pointer">Toggle Mode</div>
    </header>

    <div id="assetList">
        <div class="asset-row" onclick="this.classList.toggle('active')">
            <div class="asset-header">
                <div><strong>PROYECTO_ALPHA</strong></div>
                <div>Status: Online</div>
                <div style="text-align: right;">v 1.0.4</div>
            </div>
            <div class="asset-details">
                <p>Descripción técnica: Sistema de gestión de datos en tiempo real.</p>
                <p>Último acceso: 08/06/2026</p>
                <button>Configurar</button>
            </div>
        </div>
        <div class="asset-row" onclick="this.classList.toggle('active')">
            <div class="asset-header">
                <div><strong>STORAGE_NODE_01</strong></div>
                <div>Status: Syncing</div>
                <div style="text-align: right;">v 2.1.0</div>
            </div>
            <div class="asset-details">
                <p>Ubicación: Sector Privado Local.</p>
                <p>Capacidad: 4.2 TB / 10 TB</p>
                <button>Acceder</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('themeToggle').addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        });
    </script>
</body>
</html>
